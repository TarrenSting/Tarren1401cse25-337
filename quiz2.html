<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<script>
// LOCK CHECK
if (localStorage.getItem("lesson1") !== "done") {
    alert("Complete Lesson 1 first!");
    window.location.href = "topics.html";
}
</script>

<div class="container">

<h2>CSS Quiz</h2>

<form id="quizForm" class="quiz-container" onsubmit="event.preventDefault(); submitQuizHandler();">

    <!-- Q1 -->
    <div class="quiz-card">
        <h3>1. CSS stands for?</h3>
        <label><input type="radio" name="q1" value="a"> Creative Style Sheets</label>
        <label><input type="radio" name="q1" value="b"> Cascading Style Sheets</label>
    </div>

    <!-- Q2 -->
    <div class="quiz-card">
        <h3>2. CSS is used for?</h3>
        <label><input type="radio" name="q2" value="a"> Structure</label>
        <label><input type="radio" name="q2" value="b"> Styling</label>
    </div>

    <!-- Q3 -->
    <div class="quiz-card">
        <h3>3. Which property changes text color?</h3>
        <label><input type="radio" name="q3" value="a"> color</label>
        <label><input type="radio" name="q3" value="b"> font</label>
    </div>

    <!-- Q4 -->
    <div class="quiz-card">
        <h3>4. Which property controls size?</h3>
        <label><input type="radio" name="q4" value="a"> font-size</label>
        <label><input type="radio" name="q4" value="b"> color</label>
    </div>

    <!-- Q5 -->
    <div class="quiz-card">
        <h3>5. CSS is written in?</h3>
        <label><input type="radio" name="q5" value="a"> Rules</label>
        <label><input type="radio" name="q5" value="b"> Tags</label>
    </div>

    <!-- Q6 -->
    <div class="quiz-card">
        <h3>6. Which is best practice?</h3>
        <label><input type="radio" name="q6" value="a"> External CSS</label>
        <label><input type="radio" name="q6" value="b"> Inline CSS</label>
    </div>

    <!-- Q7 -->
    <div class="quiz-card">
        <h3>7. Which symbol starts a class?</h3>
        <label><input type="radio" name="q7" value="a"> .</label>
        <label><input type="radio" name="q7" value="b"> #</label>
    </div>

    <!-- Q8 -->
    <div class="quiz-card">
        <h3>8. Which symbol starts an ID?</h3>
        <label><input type="radio" name="q8" value="a"> #</label>
        <label><input type="radio" name="q8" value="b"> .</label>
    </div>

    <!-- Q9 -->
    <div class="quiz-card">
        <h3>9. CSS controls?</h3>
        <label><input type="radio" name="q9" value="a"> Design</label>
        <label><input type="radio" name="q9" value="b"> Logic</label>
    </div>

    <!-- Q10 -->
    <div class="quiz-card">
        <h3>10. CSS works with?</h3>
        <label><input type="radio" name="q10" value="a"> HTML</label>
        <label><input type="radio" name="q10" value="b"> Java only</label>
    </div>

    <button type="submit" class="submit-btn">Submit Quiz</button>

</form>

</div>

<script src="javascript.js"></script>

<script>
// correct answers
function submitQuizHandler() {
    const answers = [
        "b","b","a","a","a",
        "a","a","a","a","a"
    ];

    submitQuiz(answers, 2);
}
</script>

</body>
</html>
